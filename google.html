<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Google Pixel - Dripster</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Open+Sans:wght@400;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Open Sans', sans-serif;
color:#f5f5f5;
background:url('fitness-bg.jpg') no-repeat center center fixed;
background-size:cover;
}

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(6px);
z-index:-1;
}

.navbar{
display:flex;
justify-content:center;
padding:20px;
background:rgba(0,0,0,0.6);
}

.logo img{
max-width:300px;
}

.products{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:25px;
padding:40px;
max-width:900px;
margin:auto;
}

.card{
background:#1a1a1a;
padding:20px;
border-radius:20px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.5);
transition:0.3s;
}

.card:hover{
transform:translateY(-8px);
}

.card img{
width:140px;
border-radius:15px;
margin-bottom:15px;
}

.card h2{
font-family:'Playfair Display', serif;
color:#ffd700;
font-size:18px;
}

</style>
</head>

<body>

<div class="navbar">
<div class="logo">
<img src="my-logo.png">
</div>
</div>

<div class="products">

<div class="card">
<img src="pixel8.png">
<h2>Google Pixel 8</h2>
</div>

<div class="card">
<img src="pixel8pro.png">
<h2>Google Pixel 8 Pro</h2>
</div>

<div class="card">
<img src="pixel7.png">
<h2>Google Pixel 7</h2>
</div>

<div class="card">
<img src="pixel7pro.png">
<h2>Google Pixel 7 Pro</h2>
</div>

<div class="card">
<img src="pixel6.png">
<h2>Google Pixel 6</h2>
</div>

<div class="card">
<img src="pixel6pro.png">
<h2>Google Pixel 6 Pro</h2>
</div>

</div>

</body>
</html>
