<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Electronics - Dripster</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Open+Sans:wght@400;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Open Sans', sans-serif;
color:#f5f5f5;
background:url('fitness-bg.jpg') no-repeat center center fixed;
background-size:cover;
}

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(6px);
z-index:-1;
}

.navbar{
display:flex;
justify-content:center;
padding:20px;
background:rgba(0,0,0,0.6);
}

.logo img{
max-width:300px;
}

.brands{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:25px;
padding:40px;
max-width:900px;
margin:auto;
}

.brand-card{
background:#1a1a1a;
padding:20px;
border-radius:20px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.5);
transition:0.3s;
}

.brand-card:hover{
transform:translateY(-8px);
}

.brand-card img{
width:120px;
border-radius:15px;
margin-bottom:15px;
}

.brand-card h2{
font-family:'Playfair Display', serif;
color:#ffd700;
font-size:20px;
}

</style>
</head>

<body>

<div class="navbar">
<div class="logo">
<img src="my-logo.png">
</div>
</div>

<div class="brands">

<div class="brand-card">
<img src="google.png">
<h2>Google</h2>
</div>

<div class="brand-card">
<img src="apple.png">
<h2>Apple</h2>
</div>

<div class="brand-card">
<img src="samsung.png">
<h2>Samsung</h2>
</div>

<div class="brand-card">
<img src="oppo.png">
<h2>Oppo</h2>
</div>

<div class="brand-card">
<img src="vivo.png">
<h2>Vivo</h2>
</div>

<div class="brand-card">
<img src="poco.png">
<h2>Poco</h2>
</div>

<div class="brand-card">
<img src="techno.png">
<h2>Techno</h2>
</div>

<div class="brand-card">
<img src="motorola.png">
<h2>Motorola</h2>
</div>

</div>

</body>
</html>
