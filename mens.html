<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mens Fashion - Dripster</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Open+Sans:wght@400;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Open Sans', sans-serif;
color:#f5f5f5;
background:url('fitness-bg.jpg') no-repeat center center fixed;
background-size:cover;
}

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(6px);
z-index:-1;
}

.navbar{
display:flex;
justify-content:center;
padding:20px;
background:rgba(0,0,0,0.6);
}

.logo img{
max-width:300px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
padding:40px;
max-width:900px;
margin:auto;
}

.card{
background:#1a1a1a;
padding:20px;
border-radius:20px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.5);
transition:0.3s;
}

.card:hover{
transform:translateY(-8px);
}

.card img{
width:150px;
border-radius:15px;
margin-bottom:15px;
}

.card h2{
font-family:'Playfair Display', serif;
color:#ffd700;
font-size:20px;
margin-bottom:5px;
}

.card p{
font-size:15px;
margin-bottom:10px;
}

.buy-btn{
padding:10px 25px;
border:none;
border-radius:20px;
background:#ff4c4c;
color:white;
font-weight:bold;
cursor:pointer;
}

.buy-btn:hover{
background:#ff758c;
}

</style>
</head>

<body>

<div class="navbar">
<div class="logo">
<img src="my-logo.png">
</div>
</div>

<div class="products">

<!-- Product 1 -->
<div class="card">
<img src="shirt.png">
<h2>Premium Shirt</h2>
<p>₹799</p>
<button class="buy-btn" onclick="window.open('https://fktr.in/i1smr5z','_blank')">Buy Now</button>
</div>

<!-- Product 2 -->
<div class="card">
<img src="stylish-pants.png">
<h2>Stylish Pants</h2>
<p>₹480</p>
<button class="buy-btn" onclick="window.open('https://fktr.in/l60Gudp','_blank')">Buy Now</button>
</div>

<!-- Product 3 -->
<div class="card">
<img src="tshirt.png">
<h2>Casual T-Shirt</h2>
<p>₹399</p>
<button class="buy-btn" onclick="window.open('https://fktr.in/i1smr5z','_blank')">Buy Now</button>
</div>

<!-- Product 4 -->
<div class="card">
<img src="hoodie.png">
<h2>Men Hoodie</h2>
<p>₹899</p>
<button class="buy-btn" onclick="window.open('https://fktr.in/l60Gudp','_blank')">Buy Now</button>
</div>

<!-- Product 5 -->
<div class="card">
<img src="jeans.png">
<h2>Denim Jeans</h2>
<p>₹999</p>
<button class="buy-btn" onclick="window.open('https://fktr.in/i1smr5z','_blank')">Buy Now</button>
</div>

<!-- Product 6 -->
<div class="card">
<img src="jacket.png">
<h2>Leather Jacket</h2>
<p>₹1499</p>
<button class="buy-btn" onclick="window.open('https://fktr.in/l60Gudp','_blank')">Buy Now</button>
</div>

</div>

</body>
</html>
