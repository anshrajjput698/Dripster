<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mens Fashion - Dripster</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Open+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
body{
  margin:0;
  font-family:'Open Sans', sans-serif;
  font-size:17px;
  line-height:1.7;
  color:#f5f5f5;
  background: url('fitness-bg.jpg') no-repeat center center fixed;
  background-size: cover;
  position: relative;
}
body::before{
  content:"";
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(6px);
  z-index:-1;
}
.navbar{
  display:flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(4px);
  box-shadow:0 6px 20px rgba(0,0,0,0.6);
}
.logo img{
  max-width: 300px;
  height: auto;
}
.products{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap: 25px;
  margin:40px 20px;
}
.card{
  padding:20px;
  border-radius:20px;
  background:#1a1a1a;
  text-align:center;
  box-shadow:0 10px 25px rgba(0,0,0,0.5);
  transition:0.3s;
}
.card:hover{ transform:translateY(-8px); }
.card img{
  width:150px;
  margin-bottom:15px;
  border-radius:15px;
}
.card h2{
  font-family:'Playfair Display', serif;
  font-size:20px;
  margin-bottom:8px;
  color:#ffd700;
}
.card p{ font-size:14px; margin-bottom:10px; }
.buy-btn{
  padding:10px 25px;
  border:none;
  border-radius:20px;
  background:#ff4c4c;
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:0.2s;
}
.buy-btn:hover{ background:#ff758c; }
</style>
</head>
<body>

<div class="navbar">
  <div class="logo">
    <img src="my-logo.png" alt="Dripster Logo">
  </div>
</div>

<div class="products">
  <!-- PRODUCT 1 -->
  <div class="card">
    <img src="shirt.png" alt="Premium Shirt">
    <h2>Premium Shirt</h2>
    <p>₹799</p>
    <button class="buy-btn" onclick="window.open('https://fktr.in/l60Gudp','_blank')">Buy Now</button>
  </div>

  <!-- PRODUCT 2 -->
  <div class="card">
    <img src="pants.png" alt="Stylish Pants">
    <h2>Stylish Pants</h2>
    <p>₹999</p>
    <button class="buy-btn" onclick="window.open('https://fktr.in/l60Gudp','_blank')">Buy Now</button>
  </div>
</div>

</body>
</html>
